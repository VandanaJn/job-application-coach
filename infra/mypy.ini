# mypy config for the CDK sub-project. Run from this directory (`cd infra &&
# mypy`) so `stacks.*` imports resolve against infra/ as the package root —
# the same import root cdk.json uses. The repo-root mypy.ini excludes infra/
# and tests/infra/, so the two type-check domains never overlap.
[mypy]
python_version = 3.12
namespace_packages = True
explicit_package_bases = True

# CDK code plus its tests (tests/infra/ lives outside this directory).
files = ., ../tests/infra

exclude = (?x)(
    ^cdk\.out/
    | ^\.venv/
  )
