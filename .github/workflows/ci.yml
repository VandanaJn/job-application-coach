name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-progress runs when a branch is updated.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (ruff, mypy, pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements*.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      # Non-blocking pending a type-cleanup pass: the backend has pre-existing
      # type errors and missing stubs and has never been mypy-clean. Scoped to
      # the library packages — `mypy .` collides on the duplicate
      # lambda/*/handler.py module names. Make this a hard gate once cleaned up.
      - name: Type check (mypy, non-blocking)
        run: mypy agents graph api models parsers
        continue-on-error: true

      - name: Tests (pytest, 80% coverage gate)
        run: python -m pytest --cov --cov-fail-under=80

  frontend:
    name: Frontend (eslint, tsc, vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # --legacy-peer-deps: TS 6 vs packages still pinning TS ^5.
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint (eslint)
        run: npm run lint

      - name: Type check + build
        run: npm run build

      - name: Generated API types in sync
        run: npm run check:types

      - name: Tests (vitest)
        run: npm test
