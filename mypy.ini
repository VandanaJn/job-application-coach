[mypy]
python_version = 3.12
namespace_packages = True
explicit_package_bases = True

# infra/ is a separate AWS CDK sub-project: its own venv, its own
# requirements.txt, and imports rooted at infra/ rather than the repo root.
# Type-checking it from here needs conflicting path config, so it is out of
# scope for this gate (would get its own infra/mypy.ini + CI step later).
# Also excluded: virtualenvs, the frontend, and node_modules.
exclude = (?x)(
    ^infra/
    | ^tests/infra/
    | ^\.venv/
    | ^frontend/
    | ^node_modules/
  )

# boto3/botocore ship no type stubs and no py.typed marker. Pulling in
# boto3-stubs would add a heavy, version-churny dependency that gates CI on
# its own release cadence, for little gain while clients are not explicitly
# typed. Treat the SDK as untyped instead.
[mypy-boto3.*]
ignore_missing_imports = True

[mypy-botocore.*]
ignore_missing_imports = True

# mangum (Lambda/ASGI adapter) and the AgentCore runtime SDK ship no stubs.
[mypy-mangum.*]
ignore_missing_imports = True

[mypy-bedrock_agentcore.*]
ignore_missing_imports = True
